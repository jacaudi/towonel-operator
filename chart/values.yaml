# -- Operator image
image:
  repository: ghcr.io/jacaudi/towonel-operator
  # -- Image tag; defaults to .Chart.AppVersion when empty
  tag: ""
  pullPolicy: IfNotPresent

# -- Number of manager replicas
replicas: 1

# -- Manager log level (debug|info|warn|error)
logLevel: info

leaderElection:
  # -- Enable leader election for HA (passive standby)
  enabled: true

crds:
  # -- Render the CRD templates
  install: true
  # -- Stamp helm.sh/resource-policy: keep so CRDs survive uninstall
  keep: true

rbac:
  # -- Render the ClusterRole/Binding
  enabled: true

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  annotations: {}

# -- Towonel hub base URL passed to the manager
towonel:
  apiURL: https://console.towonel.dev

# -- Pre-existing Secret holding the Towonel API key (for tunnels that omit apiKeySecretRef)
credentials:
  existingSecret: ""
  tokenKey: token

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

observability:
  metrics:
    serviceMonitor:
      enabled: false
      interval: 30s

# Source layer (P5).
gatewayAPI:
  # auto: probe for gateway-api CRDs; true/false: force.
  enabled: auto
# agentNamespace: namespace for auto-created default agents ("" = tunnel's ns).
agentNamespace: ""

# Agent direct-path (spec.connectivity autodiscover) node-read RBAC.
# Creates a shared ClusterRole + (empty-subjects) ClusterRoleBinding that the
# operator patches with autodiscover agents' ServiceAccounts. Inert until the
# operator adds subjects. Disable on strict-RBAC clusters (autodiscover then
# surfaces a NodeRBACShellMissing event and degrades to relay).
agentNodeRBAC:
  create: true
