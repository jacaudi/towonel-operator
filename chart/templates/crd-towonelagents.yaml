{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
{{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
{{- end }}
  name: towonelagents.towonel.io
spec:
  group: towonel.io
  names:
    kind: TowonelAgent
    listKind: TowonelAgentList
    plural: towonelagents
    shortNames:
    - twa
    singular: towonelagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.tunnelRef.name
      name: Tunnel
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TowonelAgent is the Schema for the towonelagents API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TowonelAgentSpec defines the desired agent (routing + workload).
            properties:
              connectivity:
                description: ConnectivitySpec is the optional direct-path (NAT-traversal)
                  optimization.
                properties:
                  autodiscover:
                    type: boolean
                  extraLocalAddrs:
                    items:
                      type: string
                    type: array
                  irohPort:
                    description: |-
                      IrohPort pins the agent's bound UDP port (TOWONEL_AGENT_IROH_PORT).
                      Required when nodePort.create is true.
                    format: int32
                    maximum: 65535
                    type: integer
                  nodePort:
                    description: NodePortSpec controls an optional UDP NodePort Service
                      for iroh direct-path.
                    properties:
                      create:
                        description: Create makes the operator create+own a UDP NodePort
                          Service for the agent.
                        type: boolean
                      name:
                        description: 'Name overrides the created Service''s name (default:
                          "<agent>-iroh").'
                        type: string
                      port:
                        description: |-
                          Port pins the external node port for stable firewall/NAT-forward rules.
                          Omitted (0) -> Kubernetes auto-assigns; the agent reads whatever port exists.
                          Ignored when Create is false.
                        format: int32
                        maximum: 32767
                        minimum: 30000
                        type: integer
                    type: object
                type: object
              relayUrl:
                type: string
              services:
                items:
                  description: AgentService is an HTTPS/SNI route (hostname -> origin).
                  properties:
                    edgeTLSMode:
                      default: passthrough
                      description: |-
                        EdgeTLSMode selects edge TLS behavior: `passthrough` (default; edge peeks SNI,
                        forwards raw TLS, origin terminates) | `terminate` (edge issues on-demand cert,
                        forwards plaintext). The agent never terminates TLS.
                      type: string
                    hostname:
                      type: string
                    origin:
                      type: string
                    proxyProtocol:
                      type: boolean
                  required:
                  - hostname
                  - origin
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - hostname
                x-kubernetes-list-type: map
              tcp:
                items:
                  description: AgentL4Service is a raw TCP/UDP service (origin host:port).
                  properties:
                    hostname:
                      description: Hostname, if set, yields an A record to the edge
                        (port informational).
                      type: string
                    name:
                      type: string
                    origin:
                      type: string
                    preferredPort:
                      description: PreferredPort pins the public listen port (honored
                        if free).
                      format: int32
                      type: integer
                  required:
                  - name
                  - origin
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              tunnelRef:
                description: TunnelReference points at the TowonelTunnel this agent
                  connects to.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              udp:
                items:
                  description: AgentL4Service is a raw TCP/UDP service (origin host:port).
                  properties:
                    hostname:
                      description: Hostname, if set, yields an A record to the edge
                        (port informational).
                      type: string
                    name:
                      type: string
                    origin:
                      type: string
                    preferredPort:
                      description: PreferredPort pins the public listen port (honored
                        if free).
                      format: int32
                      type: integer
                  required:
                  - name
                  - origin
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              workload:
                description: WorkloadSpec are the agent connector knobs.
                properties:
                  image:
                    type: string
                  nodeSelector:
                    additionalProperties:
                      type: string
                    type: object
                  replicas:
                    default: 1
                    format: int32
                    type: integer
                  resources:
                    description: ResourceRequirements describes the compute resource
                      requirements.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  tolerations:
                    items:
                      description: |-
                        The pod this Toleration is attached to tolerates any taint that matches
                        the triple <key,value,effect> using the matching operator <operator>.
                      properties:
                        effect:
                          description: |-
                            Effect indicates the taint effect to match. Empty means match all taint effects.
                            When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                          type: string
                        key:
                          description: |-
                            Key is the taint key that the toleration applies to. Empty means match all taint keys.
                            If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                          type: string
                        operator:
                          description: |-
                            Operator represents a key's relationship to the value.
                            Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                            Exists is equivalent to wildcard for value, so that a pod can
                            tolerate all taints of a particular category.
                            Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                          type: string
                        tolerationSeconds:
                          description: |-
                            TolerationSeconds represents the period of time the toleration (which must be
                            of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                            it is not set, which means tolerate the taint forever (do not evict). Zero and
                            negative values will be treated as 0 (evict immediately) by the system.
                          format: int64
                          type: integer
                        value:
                          description: |-
                            Value is the taint value the toleration matches to.
                            If the operator is Exists, the value should be empty, otherwise just a regular string.
                          type: string
                      type: object
                    type: array
                type: object
            required:
            - tunnelRef
            type: object
          status:
            description: TowonelAgentStatus is the observed agent state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedConfigHash:
                type: string
              observedGeneration:
                description: ObservedGeneration is the generation most recently reconciled
                  into status.
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - WaitingForTunnel
                - Ready
                type: string
              renderedSecretRef:
                description: SecretReference names a Secret, optionally in another
                  namespace.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
