{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
{{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
{{- end }}
  name: towoneltunnels.towonel.io
spec:
  group: towonel.io
  names:
    kind: TowonelTunnel
    listKind: TowonelTunnelList
    plural: towoneltunnels
    shortNames:
    - twt
    singular: towoneltunnel
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.region
      name: Region
      type: string
    - jsonPath: .status.inviteId
      name: InviteID
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TowonelTunnel is the Schema for the towoneltunnels API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TowonelTunnelSpec defines the desired tunnel (invite + authorization).
            properties:
              apiKeySecretRef:
                description: SecretKeyRef references a single key within a Secret
                  in the same namespace.
                properties:
                  key:
                    description: Key within the Secret holding the value.
                    type: string
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - key
                - name
                type: object
              deletionPolicy:
                default: Delete
                description: DeletionPolicy controls invite teardown when a tunnel
                  is deleted.
                enum:
                - Delete
                - Retain
                type: string
              dns:
                description: TunnelDNSSpec configures vendor-neutral DNS automation
                  (emits external-dns DNSEndpoints).
                properties:
                  defaultTTL:
                    default: 300
                    format: int32
                    type: integer
                  mode:
                    default: Disabled
                    description: DNSMode selects DNS automation behavior for a tunnel.
                    enum:
                    - Disabled
                    - DNSEndpoint
                    type: string
                  namespace:
                    type: string
                type: object
              extraHostnames:
                description: ExtraHostnames authorizes hostnames no agent serves yet
                  (escape hatch).
                items:
                  type: string
                type: array
              failoverRegions:
                items:
                  type: string
                type: array
              region:
                default: EU
                type: string
              tokenExpiry:
                default: 0
                description: TokenExpiry maps to invite expires_in_secs; 0 = never
                  (hub caps finite at 30d).
                format: int64
                type: integer
            type: object
          status:
            description: TowonelTunnelStatus is the observed tunnel state.
            properties:
              authorizedHostnames:
                items:
                  type: string
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              dnsRecords:
                items:
                  description: DNSRecord is computed DNS intent (observability; not
                    an integration contract).
                  properties:
                    hostname:
                      type: string
                    port:
                      format: int32
                      type: integer
                    protocol:
                      type: string
                    target:
                      type: string
                    type:
                      enum:
                      - A
                      - AAAA
                      - CNAME
                      type: string
                  required:
                  - hostname
                  - target
                  - type
                  type: object
                type: array
              edges:
                items:
                  type: string
                type: array
              expiresAt:
                description: ExpiresAt in epoch ms; 0 = never.
                format: int64
                type: integer
              httpsEdgeTarget:
                type: string
              inviteId:
                type: string
              portAllocations:
                items:
                  description: PortAllocation is a reserved public TCP/UDP port for
                    one agent l4 service.
                  properties:
                    edge:
                      description: EdgeRef identifies an edge node and its public
                        addresses.
                      properties:
                        addresses:
                          items:
                            type: string
                          type: array
                        nodeId:
                          type: string
                      type: object
                    listenPort:
                      format: int32
                      type: integer
                    name:
                      type: string
                    protocol:
                      enum:
                      - tcp
                      - udp
                      type: string
                  required:
                  - listenPort
                  - name
                  - protocol
                  type: object
                type: array
              tenantId:
                type: string
              tokenSecretRef:
                description: SecretReference names a Secret, optionally in another
                  namespace.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
