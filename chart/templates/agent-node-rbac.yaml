{{- if .Values.agentNodeRBAC.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: towonel-operator-agent-node-reader
  labels:
    app.kubernetes.io/part-of: towonel-operator
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: towonel-operator-agent-node-reader
  labels:
    app.kubernetes.io/part-of: towonel-operator
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: towonel-operator-agent-node-reader
# subjects intentionally omitted — the operator patches them at runtime with the
# autodiscover agents' ServiceAccounts. Helm's 3-way merge preserves operator-set
# subjects across upgrades because this template never sets them.
subjects: []
{{- end }}
