---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: towonel-operator
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - towonel.io
  resources:
  - towonelagents
  - towoneltunnels
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - towonel.io
  resources:
  - towonelagents/finalizers
  - towoneltunnels/finalizers
  verbs:
  - update
- apiGroups:
  - towonel.io
  resources:
  - towonelagents/status
  - towoneltunnels/status
  verbs:
  - get
  - patch
  - update
