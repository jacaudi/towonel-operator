# https://taskfile.dev
version: '3'

vars:
  COVERAGE_FILE: coverage.out

tasks:
  default:
    desc: Run the full check suite (alias for ci)
    cmds:
      - task: ci

  tidy:
    desc: Sync go.mod / go.sum
    cmds:
      - go mod tidy

  manifests:
    desc: Generate CRDs (config/crd/bases) and RBAC (config/rbac/role.yaml) from markers
    cmds:
      - go tool controller-gen rbac:roleName=towonel-operator crd paths="./api/...;./internal/controller/..." output:crd:artifacts:config=config/crd/bases output:rbac:artifacts:config=config/rbac

  generate:
    desc: Generate deepcopy methods from kubebuilder object markers
    cmds:
      - go tool controller-gen object:headerFile="hack/boilerplate.go.txt" paths="./api/..."

  fmt:
    desc: Fail if any Go file is not gofmt-formatted
    cmds:
      - |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "These files are not gofmt-formatted:"
          echo "$unformatted"
          exit 1
        fi

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  build:
    desc: Compile all packages
    cmds:
      - go build ./...

  test:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  cover:
    desc: Run tests and print per-function coverage
    cmds:
      - go test ./... -coverprofile={{.COVERAGE_FILE}}
      - go tool cover -func={{.COVERAGE_FILE}}

  generate-helm-rbac:
    desc: Regenerate chart RBAC from config/rbac/role.yaml
    deps: [manifests]
    cmds:
      - ./hack/generate-helm-rbac.sh

  sync-helm-crds:
    desc: Wrap config/crd/bases CRDs into chart templates with install/keep gates
    deps: [manifests]
    cmds:
      - ./hack/sync-helm-crds.sh

  helm-lint:
    desc: Lint the chart using the vendored bjw-s common dependency (chart/charts/)
    cmds:
      # The bjw-s common dependency is vendored (chart/charts/common-5.0.1.tgz +
      # Chart.lock), so lint runs offline/hermetically — no `helm dependency
      # build`, which would need the upstream repo registered (absent in CI).
      - helm lint chart/

  docker-build:
    desc: Build the operator image (no push)
    cmds:
      - docker build -t towonel-operator:dev .

  verify-generated:
    desc: Fail if generated artifacts are stale (CI drift gate)
    cmds:
      - task: generate
      - task: manifests
      - task: sync-helm-crds
      - task: generate-helm-rbac
      - |
        if ! git diff --quiet -- api/v1alpha1/zz_generated.deepcopy.go config/ chart/templates/crd-*.yaml chart/templates/_values-rbac.tpl; then
          echo "Generated artifacts are stale. Run: task generate manifests sync-helm-crds generate-helm-rbac" >&2
          git --no-pager diff --stat -- api/v1alpha1/zz_generated.deepcopy.go config/ chart/templates/crd-*.yaml chart/templates/_values-rbac.tpl >&2
          exit 1
        fi

  ci:
    desc: Checks run in CI (fmt, vet, build, test, helm-lint, drift)
    cmds:
      - task: fmt
      - task: vet
      - task: build
      - task: test
      - task: helm-lint
      - task: verify-generated
