# EXPLICIT × SERVICE — you hand-author the TowonelAgent; origin is a Service ClusterIP:port (DIRECT).
# This is the simplest exposure: one HTTPS hostname forwarded straight to a backend Service.
# The agent forwards the raw TLS stream (edgeTLSMode: passthrough, the default), so the
# origin Service must terminate TLS. Use origin = the Service's ClusterIP:port (not its DNS
# name) so routing doesn't depend on in-cluster DNS at connect time.
#
# Data flow:  client → Towonel edge (peeks SNI) → agent → app Service ClusterIP:8080 (terminates TLS)
apiVersion: towonel.io/v1alpha1
kind: TowonelAgent
metadata:
  name: app-primary
  namespace: selfhosted
spec:
  tunnelRef:
    name: app
    namespace: network

  services:                              # → TOWONEL_AGENT_SERVICES (HTTPS / SNI)
    - hostname: app.domain.dev
      origin: 10.0.0.42:8080             # the app Service's ClusterIP:port (direct)
      edgeTLSMode: passthrough           # passthrough (default) = edge peeks SNI, forwards raw TLS; origin terminates
                                         #   terminate = edge terminates with an on-demand cert, forwards plaintext
      proxyProtocol: false

  tcp: []                                # → TOWONEL_AGENT_TCP_SERVICES (none here)
  udp: []                                # → TOWONEL_AGENT_UDP_SERVICES (none here)

  relayUrl: ""                           # optional TOWONEL_AGENT_RELAY_URL override

  connectivity:                          # OPTIONAL direct-path (iroh NAT-traversal) — off by default
    autodiscover: false
    irohPort: 0
    extraLocalAddrs: []
    nodePort:
      create: false
      name: ""

  workload:                              # connector knobs (CloudflareTunnel.spec.connector analog)
    replicas: 1
    image: codeberg.org/towonel/towonel-agent:0.1.32
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
    nodeSelector: {}
    tolerations: []
# ─────────────────────────────────────────────────────────────────────────────
