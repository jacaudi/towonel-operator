# EXPLICIT × GATEWAY (wildcard) — you hand-author the TowonelAgent; origin is a Gateway proxy
# ClusterIP:443, and a single WILDCARD hostname authorizes a whole zone (BROAD).
# This is the explicit equivalent of annotating a Gateway (see 06-implicit-gateway-wildcard.yaml):
# one services[] entry sends every "*.example.com" name to the in-cluster gateway data-plane
# proxy, which terminates TLS and does host routing via its own (un-annotated) HTTPRoutes.
#
# IMPORTANT (SNI): Towonel routes by the SNI the client sends; a CNAME chain does NOT rewrite
# SNI. Every hostname clients actually use must be authorized on the tunnel. A wildcard
# "*.example.com" authorizes the whole zone IF Towonel's hub accepts wildcard hostnames (verify
# upstream); otherwise enumerate each appN.example.com as its own services[] entry.
#
# Data flow:  client → Towonel edge (peeks SNI) → agent → gateway proxy ClusterIP:443
#             (passthrough; gateway terminates TLS) → gateway's HTTPRoutes → backends
apiVersion: towonel.io/v1alpha1
kind: TowonelAgent
metadata:
  name: app-gateway
  namespace: selfhosted
spec:
  tunnelRef:
    name: app
    namespace: network

  services:                              # → TOWONEL_AGENT_SERVICES (HTTPS / SNI)
    - hostname: "*.example.com"          # WILDCARD → broad: every name in the zone rides this entry
      origin: 10.0.0.200:443             # the gateway data-plane proxy Service's ClusterIP:443
      edgeTLSMode: passthrough           # raw TLS forwarded to the gateway; the GATEWAY terminates
      proxyProtocol: false

  tcp: []                                # → TOWONEL_AGENT_TCP_SERVICES (none here)
  udp: []                                # → TOWONEL_AGENT_UDP_SERVICES (none here)

  relayUrl: ""

  connectivity:
    autodiscover: false
    irohPort: 0
    extraLocalAddrs: []
    nodePort:
      create: false
      name: ""

  workload:
    replicas: 1
    image: codeberg.org/towonel/towonel-agent:0.1.32
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
    nodeSelector: {}
    tolerations: []
