# IMPLICIT × SERVICE — annotate a Service; the operator crafts the TowonelAgent entry for you
# (the dogfooding path). Origin is DIRECT — it defaults to the Service's own ClusterIP:port.
# This is the implicit equivalent of 02-explicit-service.yaml: instead of hand-authoring a
# TowonelAgent, you tag the Service and the operator materializes and owns the routing entry,
# exactly as if you had written it. No agent-ref → attaches to the tunnel's default agent for
# this cluster (auto-created if absent).
#
# Data flow:  client → Towonel edge (peeks SNI) → agent → grafana Service ClusterIP:3000 (terminates TLS)
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    towonel.io/tunnel: enable
    towonel.io/tunnel-ref: network/app
    towonel.io/hostname: grafana.domain.dev
    # towonel.io/origin: grafana.monitoring.svc:3000 # optional override; defaults to the Service ClusterIP:firstPort
    # towonel.io/edge-tls-mode: passthrough          # optional: passthrough (default) | terminate
    # towonel.io/dns-record: "false"                 # RESERVED / inert — DNS handoff is not implemented (see ../dns.md)
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
# → operator emits onto the tunnel's default agent (origin is the Service ClusterIP, not its DNS name):
#     spec.services += {hostname: grafana.domain.dev, origin: <grafana ClusterIP>:3000, edgeTLSMode: passthrough}
