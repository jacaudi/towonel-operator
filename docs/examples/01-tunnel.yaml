# TowonelTunnel — the control-plane primitive.
# Reconciles the Towonel invite (token + authorized hostnames + port reservations)
# against the Towonel user API. Owns the token Secret. "The tunnel."
apiVersion: towonel.io/v1alpha1
kind: TowonelTunnel
metadata:
  name: app
  namespace: network
spec:
  region: EU                       # POST /v1/invites .region (default EU)
  failoverRegions:                 # extra regions whose edges agents also dial
    - US
  apiKeySecretRef:                 # a personal API key is sufficient (core path; least privilege)
    name: towonel-api
    key: token
  tokenExpiry: 0                   # 0 = never expires (recommended default)
  deletionPolicy: Retain           # Retain leaves the invite alive on CR delete (prod tunnels)
  extraHostnames: []               # escape hatch: authorize a hostname no agent serves yet
  # NOTE: spec.dns (DNS handoff via external-dns DNSEndpoint) is designed but NOT yet
  # implemented — the field is accepted but inert. See docs/dns.md. For now, point your
  # public DNS at the edge addresses surfaced in status (below) yourself.
# ─────────────────────────────────────────────────────────────────────────────
# Illustrative reconciled status (operator-written; shown for reference only):
#
# status:
#   inviteId: inv_01H...
#   tenantId: ten_01H...
