# Source layer — annotated Service, single HTTPS exposure.
# The operator materializes/owns a TowonelAgent entry from this Service (dogfooding),
# exactly as if you had hand-authored it. No agent-ref → attaches to the tunnel's
# default agent for this cluster (auto-created if absent).
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    towonel.io/tunnel: enable
    towonel.io/tunnel-ref: network/app
    towonel.io/hostname: grafana.domain.dev
    # towonel.io/origin: 10.0.0.5:3000               # optional; defaults to the Service ClusterIP:firstPort
    # towonel.io/tls-mode: passthrough               # optional: passthrough (default) | terminate
    # towonel.io/dns-record: "false"                 # RESERVED / inert — DNS handoff is not implemented (see ../dns.md)
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
# → operator emits onto the tunnel's default agent (origin is the Service ClusterIP, not its DNS name):
#     spec.services += {hostname: grafana.domain.dev, origin: <grafana ClusterIP>:3000, tlsMode: passthrough}
