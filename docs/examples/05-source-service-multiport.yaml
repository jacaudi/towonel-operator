# Source layer — annotated Service exposing HTTP **and** raw TCP on one workload.
# A flat single `protocol` annotation can't express two heterogeneous exposures, so use
# PORT-NAME-SCOPED keys: towonel.io/<portName>.<suffix>, where <suffix> is one of
# hostname | tcp | udp | public-port. The operator folds them into one emitted
# TowonelAgent (services[] + tcp[]/udp[]). Unreferenced ports are not exposed.
#
# Notes:
#   - <port>.hostname ALWAYS means "expose this port as HTTPS with this hostname".
#     There is no port-scoped way to attach a DNS name to a raw tcp/udp service
#     (and DNS handoff isn't implemented anyway — see ../dns.md). For a raw service
#     that needs a public DNS record, author a TowonelAgent CR directly (02-agent.yaml).
#   - For heterogeneous exposure you can always author the TowonelAgent CR directly.
apiVersion: v1
kind: Service
metadata:
  name: gameserver
  namespace: selfhosted
  annotations:
    towonel.io/tunnel: enable
    towonel.io/tunnel-ref: network/app
    # 'web' port → HTTPS with a hostname:
    towonel.io/web.hostname: panel.domain.dev
    # 'game' port → raw TCP, with a pinned public listen port:
    towonel.io/game.tcp: "true"
    towonel.io/game.public-port: "27015"
spec:
  selector:
    app.kubernetes.io/name: gameserver
  ports:
    - name: web
      port: 8080
      targetPort: 8080
    - name: game
      port: 27015
      targetPort: 27015
      protocol: TCP
# → operator emits (the raw-TCP entry is named after the PORT; origin is the Service ClusterIP):
#     spec.services += {hostname: panel.domain.dev, origin: <gameserver ClusterIP>:8080}
#     spec.tcp      += {name: game, origin: <gameserver ClusterIP>:27015, preferredPort: 27015}
