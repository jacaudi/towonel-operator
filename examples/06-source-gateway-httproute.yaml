# Source layer — Gateway API. Opt in on the Gateway; hostnames are derived from the
# HTTPRoute(s) attached to it (and/or the listener hostnames), not hand-listed.
# Mirrors the cloudflare-operator Gateway-source pattern.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-example-com
  namespace: network
  annotations:
    towonel.io/tunnel: enable
    towonel.io/tunnel-ref: network/app
    # towonel.io/agent-ref: app-primary     # optional: pin a specific agent
spec:
  gatewayClassName: envoy                    # operator requires no GatewayClass of its own
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.example.com"
      tls: {mode: Terminate, certificateRefs: [{name: example-com-tls}]}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich
  namespace: selfhosted
spec:
  parentRefs:
    - {name: external-example-com, namespace: network, sectionName: https}
  hostnames: ["photos.example.com"]          # → derived hostname for the tunnel
  rules:
    - backendRefs: [{name: immich, port: 2283}]   # → origin for the agent service map
# → operator emits the equivalent of:
#     services: [{hostname: photos.example.com, origin: immich.selfhosted.svc:2283}]
