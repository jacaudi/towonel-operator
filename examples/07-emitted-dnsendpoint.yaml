# NOT authored by the user — this is what the operator EMITS when a TowonelTunnel has
# spec.dns.mode: DNSEndpoint. It is the vendor-neutral external-dns DNSEndpoint CRD
# (externaldns.k8s.io/v1alpha1). external-dns (run with --source=crd) reconciles it to
# whatever DNS provider you use (Cloudflare, Route53, Google, RFC2136, webhook/NextDNS …).
#
# The operator does NOT talk to any DNS provider and does NOT own this CRD — you install
# the DNSEndpoint CRD as part of your external-dns setup (optional Helm flag can install it).
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: app                      # named after the owning TowonelTunnel
  namespace: network
  labels:
    towonel.io/managed-by: towonel-operator
    towonel.io/tunnel: app
  ownerReferences:
    - apiVersion: towonel.io/v1alpha1
      kind: TowonelTunnel
      name: app
      controller: true
      blockOwnerDeletion: true
spec:
  endpoints:
    - dnsName: app.example.com          # HTTPS/SNI → CNAME to the configured regional edge target
      recordType: CNAME
      recordTTL: 300
      targets: ["eu.edge.towonel.dev"]
    - dnsName: ssh.example.com          # TCP → A to the reservation's edge address
      recordType: A
      recordTTL: 300
      targets: ["203.0.113.10"]         # NB: port (20022) is not expressible in DNS; client connects host:port
