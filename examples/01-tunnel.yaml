# TowonelTunnel — the control-plane primitive.
# Reconciles the Towonel invite (token + authorized hostnames + port reservations)
# against the Towonel user API. Owns the token Secret. "The tunnel."
apiVersion: towonel.io/v1alpha1
kind: TowonelTunnel
metadata:
  name: app
  namespace: network
spec:
  region: EU                       # POST /v1/invites .region (default EU)
  failoverRegions: [US]            # extra regions whose edges agents also dial
  apiKeySecretRef:                 # personal twk_ key is sufficient (core path; least privilege)
    name: towonel-api
    key: token
  tokenExpiry: 0                   # 0 = never expires (recommended default)
  deletionPolicy: Retain           # Retain leaves the invite alive on CR delete (prod tunnels)
  extraHostnames: []               # escape hatch: authorize a hostname no agent serves yet
  dns:
    mode: DNSEndpoint              # emit external-dns DNSEndpoint CRDs (see examples/07)
    defaultTTL: 300
    # namespace: network           # where to emit DNSEndpoints (default: this namespace)
# ─────────────────────────────────────────────────────────────────────────────
# Illustrative reconciled status (operator-written; shown for reference only):
#
# status:
#   inviteId: inv_01H...
#   tenantId: ten_01H...
#   tokenSecretRef: {name: app-token, namespace: network}
#   expiresAt: 0
#   authorizedHostnames: [app.example.com, ssh.example.com]   # aggregated from agents
#   portAllocations:
#     - {name: app-ssh, protocol: tcp, listenPort: 20022, edge: {nodeId: eu-1, addresses: ["203.0.113.10"]}}
#   edges: ["203.0.113.10"]
#   httpsEdgeTarget: eu.edge.towonel.dev   # from operator region->edgeTarget config
#   dnsRecords:                            # OBSERVABILITY ONLY (do not parse)
#     - {hostname: app.example.com, type: CNAME, target: eu.edge.towonel.dev, protocol: https}
#     - {hostname: ssh.example.com, type: A,     target: "203.0.113.10", port: 20022, protocol: tcp}
#   conditions:
#     - {type: Ready,             status: "True"}
#     - {type: InviteIssued,      status: "True"}
#     - {type: HostnamesSynced,   status: "True"}
#     - {type: PortsReserved,     status: "True"}
#     - {type: DNSEndpointsSynced, status: "True"}
